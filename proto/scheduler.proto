syntax = "proto3";

package recoveryscheduler;

// 1. Interface hosted by the Scheduler Daemon process
service SchedulerService {
  rpc RegisterService (RegisterRequest) returns (RegisterResponse);
  rpc NotifyFailure (FailureRequest) returns (FailureResponse);
}

// 2. Interface hosted by individual monitored Service processes
service ServiceRecoveryAgent {
  rpc ExecuteRecovery (RecoveryRequest) returns (RecoveryResponse);
}

enum ActionType {
  RESTART = 0;
  STOP = 1;
  DISABLE = 2;
  SUSPEND = 3;
  START = 4;
}

message RegisterRequest {
  string service_name = 1;
  string target_address = 2; // e.g. "localhost:6001" or "10.0.0.5:9000"
  repeated ActionType recovery_sequence = 3;
}

message RegisterResponse {
  bool success = 1;
}

message FailureRequest {
  string service_name = 1;
}

message FailureResponse {
  ActionType action_dispatched = 1;
  bool success = 2;
}

message RecoveryRequest {
  ActionType action = 1;
}

message RecoveryResponse {
  bool success = 1;
}
